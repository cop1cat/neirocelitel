<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мемы — НейроЦелитель</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .meme-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .meme-card {
            background-color: #d6eaf8;
            border: 1px solid #5b8fa8;
            padding: 8px;
            text-align: center;
        }

        .meme-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
            cursor: pointer;
        }

        .meme-card p {
            font-size: 12px;
            color: #154360;
            margin-top: 6px;
            font-weight: bold;
        }

        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        #lightbox.active {
            display: flex;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
        }

        @media (max-width: 820px) {
            .meme-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div id="wrapper">
    <div id="header">
        <h1>НейроЦелитель</h1>
    </div>
    <div id="nav">
        <a href="../index.html">Главная</a>
        <a href="index.html" class="active">Мемы</a>
        <a href="../classical-ml/index.html">Классический ML</a>
        <a href="../neural-nets/index.html">Нейросети</a>
    </div>
    <div id="content">
        <div id="sidebar">
            <div class="sidebar-block">
                <h3>Разделы</h3>
                <ul>
                    <li><a href="index.html">Мемы</a></li>
                    <li><a href="../classical-ml/index.html">Классический ML</a></li>
                    <li><a href="../neural-nets/index.html">Нейросети</a></li>
                </ul>
            </div>
        </div>
        <div id="main">
            <div class="content-block">
                <h2>Мемы</h2>
                <div class="meme-grid">
                    <div class="meme-card">
                        <img src="https://memepedia.ru/wp-content/uploads/2016/08/CoJj5w-W8AE-6T9.jpg" alt="дратути">
                        <p>дратути</p>
                    </div>
                    <div class="meme-card">
                        <img src="https://cdn.ruwiki.ru/ruwiki/files/thumb/9/91/%D0%A5%D0%B0%D0%B9%D0%BF%D0%B0%D0%BD%D0%B5%D0%BC.webp/600px-%D0%A5%D0%B0%D0%B9%D0%BF%D0%B0%D0%BD%D0%B5%D0%BC.webp.png" alt="хайпанём немножечко">
                        <p>хайпанём немножечко</p>
                    </div>
                    <div class="meme-card">
                        <img src="https://memchik.ru//images/memes/604dec7fb1c7e373b5444b85.jpg" alt="превед медвед">
                        <p>превед медвед</p>
                    </div>
                    <div class="meme-card">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTFnEyN1rucjIVqsOEb3i8Sc7xIN9GFi9aq5w&s" alt="рыбов продаёте">
                        <p>рыбов продаёте</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="footer">Copyright &copy; <span id="year"></span> НейроЦелитель</div>
</div>

<div id="lightbox">
    <img id="lightbox-img" src="" alt="">
</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    document.querySelectorAll('.meme-card img').forEach(img => {
        img.addEventListener('click', () => {
            lightboxImg.src = img.src;
            lightbox.classList.add('active');
        });
    });

    lightbox.addEventListener('click', () => {
        lightbox.classList.remove('active');
    });
</script>
</body>
</html>
